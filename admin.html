<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin · Anthony Njau Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    /* ----- reset & base (same style as portfolio) ----- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #18181B;
      --paper: #FAFAFA;
      --card: #F4F4F5;
      --accent: #D97706;
      --accent-deep: #92400E;
      --line: #E4E4E7;
      --muted: #71717A;
      --radius: 16px;
      --shadow: 0 10px 30px -10px rgba(0,0,0,0.06);
    }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      padding: 0 0 2px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 880px; margin: 0 auto; padding: 0 28px; }

    /* header */
    header {
      border-bottom: 1px solid var(--line);
      padding: 32px 0 20px;
      background: rgba(250,250,250,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-family: 'Source Serif 4', serif;
      font-weight: 600;
      font-size: 28px;
      letter-spacing: -0.02em;
    }
    header .sub {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }
    .admin-badge {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 2px 12px;
      border-radius: 30px;
      text-transform: uppercase;
      margin-left: 12px;
    }

    /* login overlay */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.3s ease;
    }
    #login-overlay.hidden { opacity: 0; pointer-events: none; }
    .login-box {
      background: white;
      padding: 40px 36px;
      border-radius: var(--radius);
      max-width: 380px;
      width: 100%;
      box-shadow: 0 30px 60px -20px rgba(0,0,0,0.25);
      border: 1px solid var(--line);
    }
    .login-box h2 {
      font-family: 'Source Serif 4', serif;
      font-weight: 600;
      font-size: 22px;
      margin-bottom: 6px;
    }
    .login-box p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .login-box input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 16px;
      transition: border 0.2s;
    }
    .login-box input:focus { outline: none; border-color: var(--accent); }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: var(--accent-deep); }
    .login-error {
      color: #B91C1C;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* admin panel */
    #admin-panel { display: none; }
    #admin-panel.active { display: block; }

    .admin-toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 24px 0 20px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 30px;
      border: 1px solid var(--line);
      background: white;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
    .btn-danger {
      background: #DC2626;
      border-color: #DC2626;
      color: white;
    }
    .btn-danger:hover { background: #B91C1C; }
    .btn-outline { background: transparent; }
    .btn-outline:hover { background: var(--card); }

    /* form */
    .form-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px 30px;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
      display: none;
    }
    .form-card.open { display: block; }
    .form-card h3 {
      font-family: 'Source Serif 4', serif;
      font-weight: 600;
      font-size: 20px;
      margin-bottom: 18px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #3F3F46;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .form-actions .btn { flex: 1; justify-content: center; }

    /* project list */
    .project-list { margin-top: 8px; }
    .project-item {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .project-item:hover { border-color: #D4D4D8; }
    .project-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .project-info strong {
      font-family: 'Source Serif 4', serif;
      font-size: 17px;
      font-weight: 600;
    }
    .project-info .meta {
      font-size: 13px;
      color: var(--muted);
    }
    .project-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .project-actions .btn {
      padding: 6px 16px;
      font-size: 12px;
    }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-style: italic;
    }

    footer {
      margin-top: 40px;
      padding: 24px 0 40px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    footer a { color: var(--accent-deep); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .login-box { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<!-- ===== LOGIN OVERLAY ===== -->
<div id="login-overlay">
  <div class="login-box">
    <h2>Admin access</h2>
    <p>Enter your password to manage projects</p>
    <input type="password" id="admin-pw" placeholder="Password" />
    <button id="login-btn">Unlock</button>
    <div id="login-error" class="login-error">Incorrect password</div>
  </div>
</div>

<!-- ===== MAIN ADMIN PANEL ===== -->
<div id="admin-panel">
  <div class="wrap">

    <header>
      <h1>⚙️ Project Admin <span class="admin-badge">protected</span></h1>
      <div class="sub">Manage your portfolio projects — changes appear instantly on the live site.</div>
    </header>

    <div class="admin-toolbar">
      <button class="btn btn-primary" id="show-add-form">＋ Add new project</button>
      <button class="btn btn-outline" id="refresh-list">⟳ Refresh</button>
      <button class="btn btn-outline" id="logout-btn" style="margin-left:auto;">🚪 Logout</button>
    </div>

    <!-- add / edit form -->
    <div class="form-card" id="project-form">
      <h3 id="form-title">Add project</h3>
      <input type="hidden" id="edit-id" />
      <div class="form-group">
        <label>Project title</label>
        <input type="text" id="f-title" placeholder="e.g. Library Catalog System" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="f-desc" placeholder="Brief description of the project…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="f-image" placeholder="https://example.com/image.jpg" />
        </div>
        <div class="form-group">
          <label>Project link (optional)</label>
          <input type="text" id="f-link" placeholder="https://example.com/project" />
        </div>
      </div>
      <div class="form-group">
        <label>Tags (comma separated)</label>
        <input type="text" id="f-tags" placeholder="e.g. Python, UI, Data" />
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="save-project">💾 Save project</button>
        <button class="btn btn-outline" id="cancel-edit">Cancel</button>
      </div>
    </div>

    <!-- project list -->
    <div class="project-list" id="project-list">
      <div class="empty-state">Loading projects…</div>
    </div>

    <footer>
      <span>Anthony Njau — Admin</span>
      <span><a href="#" onclick="window.location.reload();">← back to portfolio</a></span>
    </footer>

  </div>
</div>

<script>
  /* =========================================================
     FIREBASE CONFIG – same as your portfolio
     ========================================================= */
  const firebaseConfig = {
    apiKey: "AIzaSyDVfWCCyCGfbVhw3sQNIOTkYapfo7B9B1M",
    authDomain: "portfolio-management-ed2d5.firebaseapp.com",
    databaseURL: "https://portfolio-management-ed2d5-default-rtdb.firebaseio.com",
    projectId: "portfolio-management-ed2d5",
    storageBucket: "portfolio-management-ed2d5.firebasestorage.app",
    messagingSenderId: "307935862567",
    appId: "1:307935862567:web:9a3dce523d134c96bbd302",
    measurementId: "G-X797LW4YQB"
  };

  // ----- DOM refs -----
  const loginOverlay = document.getElementById('login-overlay');
  const adminPanel = document.getElementById('admin-panel');
  const loginBtn = document.getElementById('login-btn');
  const loginPw = document.getElementById('admin-pw');
  const loginError = document.getElementById('login-error');

  const projectList = document.getElementById('project-list');
  const formCard = document.getElementById('project-form');
  const formTitle = document.getElementById('form-title');
  const editId = document.getElementById('edit-id');
  const fTitle = document.getElementById('f-title');
  const fDesc = document.getElementById('f-desc');
  const fImage = document.getElementById('f-image');
  const fLink = document.getElementById('f-link');
  const fTags = document.getElementById('f-tags');
  const saveBtn = document.getElementById('save-project');
  const cancelBtn = document.getElementById('cancel-edit');
  const showAddBtn = document.getElementById('show-add-form');
  const refreshBtn = document.getElementById('refresh-list');
  const logoutBtn = document.getElementById('logout-btn');

  // ----- state -----
  const ADMIN_PASSWORD = 'anthony2026'; // change this!
  let db = null;
  let projects = [];
  let editingId = null;

  // ----- init firebase -----
  function initFirebase() {
    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      return true;
    } catch (e) {
      alert('Firebase init error: ' + e.message);
      return false;
    }
  }

  // ----- login -----
  loginBtn.addEventListener('click', function() {
    const pw = loginPw.value.trim();
    if (pw === ADMIN_PASSWORD) {
      loginOverlay.classList.add('hidden');
      adminPanel.classList.add('active');
      if (initFirebase()) {
        loadProjects();
      }
    } else {
      loginError.style.display = 'block';
      loginPw.value = '';
      loginPw.focus();
    }
  });

  loginPw.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginBtn.click();
  });

  // ----- logout -----
  logoutBtn.addEventListener('click', function() {
    adminPanel.classList.remove('active');
    loginOverlay.classList.remove('hidden');
    loginPw.value = '';
    loginError.style.display = 'none';
    projects = [];
    projectList.innerHTML = '<div class="empty-state">Loading projects…</div>';
  });

  // ----- load projects (real-time) -----
  function loadProjects() {
    if (!db) return;
    db.collection('projects').onSnapshot((snapshot) => {
      const list = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        data._id = doc.id;
        list.push(data);
      });
      list.sort((a, b) => {
        const ta = a.createdAt?.toMillis?.() || 0;
        const tb = b.createdAt?.toMillis?.() || 0;
        return ta - tb;
      });
      projects = list;
      renderList();
    }, (err) => {
      projectList.innerHTML = `<div class="empty-state" style="color:#B91C1C;">⚠️ Error loading: ${err.message}</div>`;
    });
  }

  // ----- render list -----
  function renderList() {
    if (!projects.length) {
      projectList.innerHTML = `<div class="empty-state">No projects yet. Add your first one!</div>`;
      return;
    }
    let html = '';
    projects.slice().reverse().forEach(p => {
      const tags = (p.tags || []).join(', ');
      html += `
        <div class="project-item">
          <div class="project-info">
            <strong>${escapeHtml(p.title || 'Untitled')}</strong>
            <span class="meta">${escapeHtml(p.desc || '')} ${tags ? '· ' + escapeHtml(tags) : ''}</span>
          </div>
          <div class="project-actions">
            <button class="btn btn-outline btn-sm" data-id="${p._id}" data-action="edit">✎ Edit</button>
            <button class="btn btn-danger btn-sm" data-id="${p._id}" data-action="delete">✕ Delete</button>
          </div>
        </div>
      `;
    });
    projectList.innerHTML = html;

    // attach event listeners
    projectList.querySelectorAll('[data-action="edit"]').forEach(btn => {
      btn.addEventListener('click', () => editProject(btn.dataset.id));
    });
    projectList.querySelectorAll('[data-action="delete"]').forEach(btn => {
      btn.addEventListener('click', () => deleteProject(btn.dataset.id));
    });
  }

  // ----- edit project -----
  function editProject(id) {
    const p = projects.find(proj => proj._id === id);
    if (!p) return;
    editingId = id;
    formTitle.textContent = '✎ Edit project';
    editId.value = id;
    fTitle.value = p.title || '';
    fDesc.value = p.desc || '';
    fImage.value = p.image || '';
    fLink.value = p.link || '';
    fTags.value = (p.tags || []).join(', ');
    formCard.classList.add('open');
    formCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ----- delete project -----
  function deleteProject(id) {
    if (!db) return;
    if (!confirm('Delete this project permanently?')) return;
    db.collection('projects').doc(id).delete()
      .then(() => { /* real-time update handles it */ })
      .catch(err => alert('Delete error: ' + err.message));
  }

  // ----- save (add or update) -----
  function saveProject() {
    if (!db) return;
    const title = fTitle.value.trim();
    if (!title) { alert('Title is required.'); return; }

    const data = {
      title,
      desc: fDesc.value.trim(),
      image: fImage.value.trim(),
      link: fLink.value.trim(),
      tags: fTags.value.split(',').map(s => s.trim()).filter(Boolean),
    };

    const id = editId.value;
    const promise = id
      ? db.collection('projects').doc(id).update(data)
      : db.collection('projects').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });

    promise.then(() => {
      resetForm();
      // real-time update will refresh list
    }).catch(err => alert('Save error: ' + err.message));
  }

  // ----- reset form -----
  function resetForm() {
    formCard.classList.remove('open');
    editId.value = '';
    fTitle.value = '';
    fDesc.value = '';
    fImage.value = '';
    fLink.value = '';
    fTags.value = '';
    editingId = null;
    formTitle.textContent = 'Add project';
  }

  // ----- helpers -----
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  // ----- event bindings -----
  showAddBtn.addEventListener('click', () => {
    resetForm();
    formCard.classList.add('open');
    formTitle.textContent = '＋ Add project';
    fTitle.focus();
  });

  cancelBtn.addEventListener('click', resetForm);
  saveBtn.addEventListener('click', saveProject);

  refreshBtn.addEventListener('click', () => {
    if (db) loadProjects();
  });

  // close form on escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && formCard.classList.contains('open')) resetForm();
  });

  // if firebase init fails on login, we already handle in login click
  // but also if user reloads while logged in?
  // on load, if admin panel is active but firebase not init? we keep it.

  console.log('Admin panel ready — default password: anthony2026');
</script>
</body>
</html>
