<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Anthony Njau Portfolio</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #FAFAFA; padding: 40px 20px; }
  .wrap { max-width: 500px; margin: 0 auto; }
  .login-box {
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    border: 1px solid #E4E4E7;
  }
  .login-box h2 { margin-bottom: 8px; }
  .login-box p { color: #71717A; margin-bottom: 20px; }
  .login-box input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #E4E4E7;
    border-radius: 10px;
    font-size: 15px;
    margin-bottom: 12px;
  }
  .login-box button {
    width: 100%;
    padding: 12px;
    background: #D97706;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
  }
  .login-box button:hover { background: #92400E; }
  .error { color: #B91C1C; font-size: 13px; margin-top: 10px; display: none; }
  .success { color: #16A34A; font-size: 13px; margin-top: 10px; display: none; }
  .admin-panel { display: none; margin-top: 20px; }
  .admin-panel.active { display: block; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-weight: 500; font-size: 13px; margin-bottom: 4px; }
  .form-group input, .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #E4E4E7;
    border-radius: 10px;
    font-size: 14px;
  }
  .btn {
    padding: 10px 20px;
    border-radius: 30px;
    border: 1px solid #E4E4E7;
    background: white;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-primary { background: #D97706; color: white; border-color: #D97706; }
  .btn-primary:hover { background: #92400E; }
  .btn-danger { background: #DC2626; color: white; border-color: #DC2626; }
  .btn-danger:hover { background: #B91C1C; }
  .logout-btn { float: right; }
  .tab { margin-top: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="login-box" id="login-box">
    <h2>🔐 Admin Access</h2>
    <p>Enter your password to manage your portfolio</p>
    <input type="password" id="admin-pw" placeholder="Password" />
    <button id="login-btn">Unlock</button>
    <div id="login-error" class="error">Incorrect password</div>
  </div>

  <div class="admin-panel" id="admin-panel">
    <div style="background:white; padding:20px; border-radius:16px; border:1px solid #E4E4E7; margin-bottom:20px;">
      <h3>⚙️ Admin Panel <span style="font-size:12px; color:#71717A; font-weight:normal;">(protected)</span></h3>
      <button class="btn btn-danger logout-btn" id="logout-btn" style="font-size:12px;">Logout</button>
      <div style="clear:both;"></div>
    </div>

    <!-- Projects Section -->
    <div style="background:white; padding:24px; border-radius:16px; border:1px solid #E4E4E7; margin-bottom:20px;">
      <h4>📁 Projects</h4>
      <div style="margin:16px 0;">
        <button class="btn btn-primary" id="show-add-form">+ Add Project</button>
      </div>
      <div id="project-form" style="display:none; border-top:1px solid #E4E4E7; padding-top:16px; margin-top:16px;">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="f-title" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="f-desc" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="f-image" />
        </div>
        <div class="form-group">
          <label>Project Link</label>
          <input type="text" id="f-link" />
        </div>
        <div class="form-group">
          <label>Tags (comma separated)</label>
          <input type="text" id="f-tags" />
        </div>
        <button class="btn btn-primary" id="save-project">Save Project</button>
        <button class="btn" id="cancel-edit" style="margin-left:10px;">Cancel</button>
        <div id="project-success" class="success" style="margin-top:10px;">✅ Project saved!</div>
      </div>
      <div id="project-list" style="margin-top:12px;">
        <div style="color:#71717A; font-style:italic;">Loading projects...</div>
      </div>
    </div>

    <!-- About & Contact Section -->
    <div style="background:white; padding:24px; border-radius:16px; border:1px solid #E4E4E7; margin-bottom:20px;">
      <h4>✏️ About & Contact</h4>
      <div class="form-group">
        <label>Tagline</label>
        <input type="text" id="about-tagline" placeholder="Your tagline here" />
      </div>
      <div class="form-group">
        <label>About Text</label>
        <textarea id="about-text" rows="4" placeholder="Write your about content..."></textarea>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="contact-email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>LinkedIn URL</label>
        <input type="text" id="contact-linkedin" placeholder="https://linkedin.com/in/..." />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="contact-phone" placeholder="+1234567890" />
      </div>
      <button class="btn btn-primary" id="save-about">Save About & Contact</button>
      <div id="about-success" class="success" style="margin-top:10px;">✅ Saved successfully!</div>
    </div>
  </div>
</div>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyDVfWCCyCGfbVhw3sQNIOTkYapfo7B9B1M",
    authDomain: "portfolio-management-ed2d5.firebaseapp.com",
    databaseURL: "https://portfolio-management-ed2d5-default-rtdb.firebaseio.com",
    projectId: "portfolio-management-ed2d5",
    storageBucket: "portfolio-management-ed2d5.firebasestorage.app",
    messagingSenderId: "307935862567",
    appId: "1:307935862567:web:9a3dce523d134c96bbd302",
    measurementId: "G-X797LW4YQB"
  };

  const ADMIN_PASSWORD = 'anthony2026';
  let db = null;

  // DOM refs
  const loginBox = document.getElementById('login-box');
  const adminPanel = document.getElementById('admin-panel');
  const loginBtn = document.getElementById('login-btn');
  const loginPw = document.getElementById('admin-pw');
  const loginError = document.getElementById('login-error');
  const logoutBtn = document.getElementById('logout-btn');

  // Projects
  const projectList = document.getElementById('project-list');
  const formCard = document.getElementById('project-form');
  const fTitle = document.getElementById('f-title');
  const fDesc = document.getElementById('f-desc');
  const fImage = document.getElementById('f-image');
  const fLink = document.getElementById('f-link');
  const fTags = document.getElementById('f-tags');
  const saveBtn = document.getElementById('save-project');
  const cancelBtn = document.getElementById('cancel-edit');
  const showAddBtn = document.getElementById('show-add-form');
  const projectSuccess = document.getElementById('project-success');

  // About
  const aboutTagline = document.getElementById('about-tagline');
  const aboutText = document.getElementById('about-text');
  const contactEmail = document.getElementById('contact-email');
  const contactLinkedin = document.getElementById('contact-linkedin');
  const contactPhone = document.getElementById('contact-phone');
  const saveAboutBtn = document.getElementById('save-about');
  const aboutSuccess = document.getElementById('about-success');

  // Init Firebase
  function initFirebase() {
    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      return true;
    } catch(e) {
      console.warn('Firebase init warning:', e.message);
      return false;
    }
  }

  // Login
  loginBtn.addEventListener('click', function() {
    const pw = loginPw.value.trim();
    if (pw === ADMIN_PASSWORD) {
      loginBox.style.display = 'none';
      adminPanel.classList.add('active');
      initFirebase();
      loadProjects();
      loadAbout();
    } else {
      loginError.style.display = 'block';
      loginPw.value = '';
      loginPw.focus();
    }
  });

  loginPw.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginBtn.click();
  });

  // Logout
  logoutBtn.addEventListener('click', function() {
    adminPanel.classList.remove('active');
    loginBox.style.display = 'block';
    loginPw.value = '';
    loginError.style.display = 'none';
  });

  // Load Projects
  function loadProjects() {
    if (!db) return;
    db.collection('projects').onSnapshot((snapshot) => {
      const list = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        data._id = doc.id;
        list.push(data);
      });
      renderProjectList(list);
    }, (err) => {
      projectList.innerHTML = `<div style="color:#B91C1C;">⚠️ Error loading: ${err.message}</div>`;
    });
  }

  function renderProjectList(projects) {
    if (!projects.length) {
      projectList.innerHTML = '<div style="color:#71717A; font-style:italic;">No projects yet.</div>';
      return;
    }
    let html = '';
    projects.slice().reverse().forEach(p => {
      html += `
        <div style="background:#F4F4F5; padding:12px 16px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong>${escapeHtml(p.title || 'Untitled')}</strong>
            <div style="font-size:13px; color:#71717A;">${escapeHtml(p.desc || '')}</div>
          </div>
          <div>
            <button class="btn btn-danger" style="padding:4px 12px; font-size:12px;" onclick="deleteProject('${p._id}')">Delete</button>
          </div>
        </div>
      `;
    });
    projectList.innerHTML = html;
  }

  window.deleteProject = function(id) {
    if (!db) return;
    if (!confirm('Delete this project?')) return;
    db.collection('projects').doc(id).delete()
      .then(() => { /* handled by real-time update */ })
      .catch(err => alert('Error: ' + err.message));
  };

  // Save Project
  function saveProject() {
    if (!db) return;
    const title = fTitle.value.trim();
    if (!title) { alert('Title is required.'); return; }
    const data = {
      title,
      desc: fDesc.value.trim(),
      image: fImage.value.trim(),
      link: fLink.value.trim(),
      tags: fTags.value.split(',').map(s => s.trim()).filter(Boolean),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    db.collection('projects').add(data)
      .then(() => {
        formCard.style.display = 'none';
        fTitle.value = ''; fDesc.value = ''; fImage.value = ''; fLink.value = ''; fTags.value = '';
        projectSuccess.style.display = 'block';
        setTimeout(() => projectSuccess.style.display = 'none', 3000);
      })
      .catch(err => alert('Error: ' + err.message));
  }

  // Save About
  function saveAbout() {
    if (!db) return;
    const data = {
      tagline: aboutTagline.value.trim(),
      text: aboutText.value.trim(),
      email: contactEmail.value.trim(),
      linkedin: contactLinkedin.value.trim(),
      phone: contactPhone.value.trim(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    db.collection('settings').doc('about').set(data, { merge: true })
      .then(() => {
        aboutSuccess.style.display = 'block';
        setTimeout(() => aboutSuccess.style.display = 'none', 3000);
      })
      .catch(err => alert('Error: ' + err.message));
  }

  // Load About
  function loadAbout() {
    if (!db) return;
    db.collection('settings').doc('about').onSnapshot((doc) => {
      if (doc.exists) {
        const data = doc.data();
        aboutTagline.value = data.tagline || '';
        aboutText.value = data.text || '';
        contactEmail.value = data.email || '';
        contactLinkedin.value = data.linkedin || '';
        contactPhone.value = data.phone || '';
      }
    });
  }

  // Event listeners
  showAddBtn.addEventListener('click', () => {
    formCard.style.display = 'block';
    formCard.scrollIntoView({ behavior: 'smooth' });
  });

  cancelBtn.addEventListener('click', () => {
    formCard.style.display = 'none';
    fTitle.value = ''; fDesc.value = ''; fImage.value = ''; fLink.value = ''; fTags.value = '';
  });

  saveBtn.addEventListener('click', saveProject);
  saveAboutBtn.addEventListener('click', saveAbout);

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  console.log('✅ Admin panel ready. Password: anthony2026');
</script>
</body>
</html>
